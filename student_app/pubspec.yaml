name: student_app
description: Geo-Fenced Attendance Student Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Firebase - More stable versions for Flutter 3.35.1  
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3  
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  
  # Location & Geofencing
  geolocator: ^10.1.1
  permission_handler: ^11.4.0
  
  # UI
  cupertino_icons: ^1.0.2
  flutter_spinkit: ^5.2.0
  flutter_svg: ^2.0.10
  intl: ^0.18.1
  fluttertoast: ^8.2.4
  
  # Image
  image_picker: ^1.0.4
  
  # Network
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

# App Icon Configuration
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  web:
    generate: true
    image_path: "assets/images/logo.png"
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"
